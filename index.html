<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Постеры - Слайдер</title>
    <style>
        @font-face {
            font-family: 'Chair406';
            src: url('fonts/Chair406.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 🆕 НОВАЯ ШАПКА КАК НА КАРТИНКЕ */
        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(135deg, 
                rgba(229, 229, 229, 0.95) 0%, 
                rgba(245, 245, 245, 0.9) 100%);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .logo {
            font-family: 'Chair406', Arial, sans-serif;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #d87093, #ff9bb8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }
        
        .header-nav {
            display: flex;
            gap: 40px;
            list-style: none;
            align-items: center;
        }
        
        .header-nav a {
            color: #666;
            text-decoration: none;
            font-family: 'Chair406', Arial, sans-serif;
            font-size: 16px;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.3s ease;
        }
        
        .header-nav a:hover {
            color: #d87093;
            background: rgba(216, 112, 147, 0.1);
            transform: translateY(-2px);
        }
        
        .header-cart {
            position: relative;
            width: 50px;
            height: 50px;
            border-radius: 15px;
            background: rgba(216, 112, 147, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d87093;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .header-cart:hover {
            background: linear-gradient(135deg, #d87093, #ff9bb8);
            color: white;
            transform: scale(1.05);
        }

        /* Контакты внизу (остаются) */
        .contacts-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: linear-gradient(135deg, 
                rgba(253, 245, 240, 0.95) 0%, 
                rgba(255, 182, 193, 0.9) 100%);
            backdrop-filter: blur(25px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-shadow: 0 -8px 30px rgba(216, 112, 147, 0.3);
        }
        
        .contacts-left {
            display: flex;
            gap: 30px;
            align-items: center;
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #d87093;
            font-family: 'Chair406', Arial, sans-serif;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .contact-item:hover {
            background: linear-gradient(135deg, #d87093, #ff9bb8);
            color: white;
            transform: translateY(-2px);
        }
        
        .social-links {
            display: flex;
            gap: 15px;
        }
        
        .social-link {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d87093, #ff9bb8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .social-link:hover {
            transform: scale(1.15);
        }

        /* Контент */
        .main-content {
            padding-top: 80px;  /* новая шапка */
            padding-bottom: 70px; /* контакты */
            min-height: 100vh;
            overflow-y: auto;
            display: flex;
        }
        
        body {
            background: 
                linear-gradient(135deg, rgba(255, 182, 193, 0.7) 0%, rgba(253, 240, 235, 0.5) 100%),
                url("pink_background.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Chair406', Arial, sans-serif;
        }
        
        /* СЛАЙДЕР (без изменений) */
        .info-panel {
            width: 380px;
            background: rgba(253, 245, 240, 0.75);
            backdrop-filter: blur(20px);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 5px 0 30px rgba(255, 182, 193, 0.3);
            flex-shrink: 0;
        }
        
        .info-panel h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #d87093, #ff9bb8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }
        
        .info-panel .current-slide {
            font-size: 20px;
            font-weight: 500;
            color: #555;
            margin-bottom: 50px;
            background: rgba(255, 245, 240, 0.85);
            padding: 18px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 20px rgba(216, 112, 147, 0.2);
        }
        
        .dots { display: flex; gap: 12px; justify-content: center; }
        .dot {
            width: 14px; height: 14px; border-radius: 50%;
            background: rgba(255, 182, 193, 0.7); cursor: pointer;
            transition: all 0.3s ease;
        }
        .dot.active { background: #d87093; transform: scale(1.4); }

        .slider-section {
            flex: 1; position: relative; margin-left: 20px;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }
        
        .slider-container {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; overflow: hidden;
        }
        
        .slider-track { display: flex; height: 100%; transition: transform 1s ease; }
        .slider-slide {
            min-width: 100%; height: 100%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        
        .slide-image-container {
            width: 570px; height: 1122px; max-height: 85vh;
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 30px 100px rgba(216, 112, 147, 0.4);
            background: rgba(255, 245, 240, 0.1);
            backdrop-filter: blur(15px); border: 3px solid rgba(255, 182, 193, 0.6);
            transition: all 0.4s ease; cursor: pointer;
        }
        
        .slide-image-container:hover {
            transform: scale(1.02);
            box-shadow: 0 40px 120px rgba(216, 112, 147, 0.5);
        }
        
        .slide-image-container img { 
            width: 100%; height: 100%; object-fit: contain; 
        }
        
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 45px; height: 45px; border: none; border-radius: 50%;
            background: rgba(253, 245, 240, 0.85); color: #d87093;
            font-size: 18px; font-weight: 600; cursor: pointer; z-index: 100;
            backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .left-btn { left: 40px; }
        .right-btn { right: 40px; }
        .nav-btn:hover {
            background: rgba(255, 182, 193, 0.95); color: white;
            transform: translateY(-50%) scale(1.1);
        }

        @media (max-width: 768px) {
            .site-header { padding: 0 20px; height: 70px; }
            .header-nav { gap: 20px; }
            .header-nav a { font-size: 14px; padding: 8px 15px; }
            .main-content { padding-top: 70px; }
        }
    </style>
</head>
<body>
    <!-- 🆕 ШАПКА КАК НА КАРТИНКЕ -->
    <header class="site-header">
        <div class="logo">🛍️ Портфолио</div>
        <nav class="header-nav">
            <a href="#home">Главная</a>
            <a href="#shops">Постеры</a>
            <a href="#top">Топ</a>
            <a href="#live">Живой</a>
            <a href="#collections">Коллекции</a>
        </nav>
        <div class="header-cart">🛒</div>
    </header>

    <!-- КОНТЕНТ -->
    <div class="main-content">
        <div class="info-panel">
            <h1>🖼️ Постеры</h1>
            <div class="current-slide" id="currentSlideInfo">Summer party • 1 290 ₽</div>
            <div class="dots" id="dotsContainer"></div>
        </div>
        
        <div class="slider-section">
            <div class="slider-container">
                <div class="slider-track" id="sliderTrack"></div>
            </div>
            <button class="nav-btn left-btn" onclick="moveSlide(-1)">‹</button>
            <button class="nav-btn right-btn" onclick="moveSlide(1)">›</button>
        </div>
    </div>

    <!-- КОНТАКТЫ ВНИЗУ -->
    <div class="contacts-panel">
        <div class="contacts-left">
            <a href="tel:+79229537600" class="contact-item">📱 +7 (922) 953-76-00</a>
            <a href="mailto:rudakovskayasx@gmail.com" class="contact-item">✉️ rudakovskayasx@gmail.com</a>
        </div>
        <div class="social-links">
            <a href="#" class="social-link">📱</a>
            <a href="#" class="social-link">📘</a>
        </div>
    </div>

    <!-- СКРИПТ (БЕЗ ИЗМЕНЕНИЙ) -->
    <script>
        const posterSlides = [
            {image: 'пляж3.jpg', title: 'Summer party', price: '1 290 ₽'},
            {image: 'постер 14 ф.png', title: "Valentine's day", price: '1 490 ₽'},
            {image: 'постер merry chrismas.png', title: 'Merry Christmas', price: '1 390 ₽'},
            {image: 'плакат 1 (2).png', title: 'Постер', price: '1 590 ₽'}
        ];

        const track = document.getElementById('sliderTrack');
        const dotsContainer = document.getElementById('dotsContainer');
        const currentSlideInfo = document.getElementById('currentSlideInfo');
        let currentIndex = 1;
        let slideCount = posterSlides.length;
        let autoScrollInterval;
        let isPaused = false;

        function initSlider() {
            posterSlides.forEach((slideData, index) => {
                const slide = document.createElement('div');
                slide.className = 'slider-slide';
                
                const imageContainer = document.createElement('div');
                imageContainer.className = 'slide-image-container';
                const img = document.createElement('img');
                img.src = slideData.image;
                img.alt = slideData.title;
                
                img.onerror = function() {
                    this.style.background = 'linear-gradient(135deg, #f9e4e8, #f0d4d9)';
                    this.style.display = 'flex';
                    this.style.alignItems = 'center';
                    this.style.justifyContent = 'center';
                    this.style.color = '#d87093';
                    this.style.fontSize = '24px';
                    this.style.fontWeight = '600';
                    this.textContent = slideData.title;
                };
                
                imageContainer.appendChild(img);
                slide.appendChild(imageContainer);
                track.appendChild(slide);
                
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.onclick = () => goToSlide(index + 1);
                dotsContainer.appendChild(dot);
            });
            
            const firstClone = track.firstElementChild.cloneNode(true);
            const lastClone = track.lastElementChild.cloneNode(true);
            track.appendChild(firstClone);
            track.insertBefore(lastClone, track.firstElementChild);
            
            updateSlider();
            startAutoScroll();
        }

        function updateSlider() {
            track.style.transform = `translateX(-${currentIndex * 100}%)`;
            updateDots();
            updateInfoPanel();
        }

        function updateInfoPanel() {
            const realIndex = ((currentIndex - 1 + slideCount) % slideCount);
            const slideData = posterSlides[realIndex] || posterSlides[0];
            currentSlideInfo.textContent = `${slideData.title} • ${slideData.price}`;
        }

        function updateDots() {
            document.querySelectorAll('.dot').forEach((dot, index) => {
                const realIndex = ((currentIndex - 1 + slideCount) % slideCount);
                dot.classList.toggle('active', index === realIndex);
            });
        }

        function moveSlide(direction) {
            pauseAutoScroll();
            currentIndex += direction;
            if (currentIndex > slideCount) currentIndex = 1;
            if (currentIndex < 1) currentIndex = slideCount;
            updateSlider();
            setTimeout(resumeAutoScroll, 2000);
        }

        function goToSlide(n) {
            currentIndex = n;
            pauseAutoScroll();
            updateSlider();
            setTimeout(resumeAutoScroll, 2000);
        }

        function startAutoScroll() {
            autoScrollInterval = setInterval(() => {
                if (!isPaused) moveSlide(1);
            }, 6000);
        }

        function pauseAutoScroll() {
            isPaused = true;
            clearInterval(autoScrollInterval);
        }

        function resumeAutoScroll() {
            isPaused = false;
            startAutoScroll();
        }

        document.addEventListener('DOMContentLoaded', function() {
            initSlider();
            document.querySelector('.left-btn').addEventListener('mouseenter', pauseAutoScroll);
            document.querySelector('.right-btn').addEventListener('mouseenter', pauseAutoScroll);
            document.querySelector('.left-btn').addEventListener('mouseleave', resumeAutoScroll);
            document.querySelector('.right-btn').addEventListener('mouseleave', resumeAutoScroll);
        });
    </script>
</body>
</html>
