<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Постеры - Слайдер</title>
    <style>
        /* ШРИФТ CHAIR 406 */
        @font-face {
            font-family: 'Chair406';
            src: url('fonts/Chair406.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* ШАПКА */
        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(253, 245, 240, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-shadow: 0 4px 25px rgba(216, 112, 147, 0.2);
            border-bottom: 1px solid rgba(255, 182, 193, 0.3);
        }
        
        .logo {
            font-family: 'Chair406', Arial, sans-serif;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #d87093, #ff9bb8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header-nav {
            display: flex;
            gap: 30px;
            list-style: none;
        }
        
        .header-nav a {
            color: #555;
            text-decoration: none;
            font-family: 'Chair406', Arial, sans-serif;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .header-nav a:hover {
            color: #d87093;
            transform: translateY(-2px);
        }
        
        .header-nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, #d87093, #ff9bb8);
            transition: width 0.3s ease;
        }
        
        .header-nav a:hover::after {
            width: 100%;
        }

        /* 🆕 НОЖКА (КОНТАКТЫ) */
        .site-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: rgba(253, 245, 240, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-shadow: 0 -4px 25px rgba(216, 112, 147, 0.2);
            border-top: 1px solid rgba(255, 182, 193, 0.3);
        }
        
        .footer-contacts {
            display: flex;
            gap: 25px;
            align-items: center;
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #555;
            font-family: 'Chair406', Arial, sans-serif;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .contact-item:hover {
            color: #d87093;
            transform: translateY(-1px);
        }
        
        .social-links {
            display: flex;
            gap: 15px;
        }
        
        .social-link {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 182, 193, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d87093;
            font-size: 18px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .social-link:hover {
            background: #d87093;
            color: white;
            transform: scale(1.1);
        }
        
        /* ОСНОВНОЙ КОНТЕНТ */
        .main-content {
            padding-top: 70px;  /* шапка */
            padding-bottom: 80px; /* ножка */
            min-height: 100vh;
            overflow-y: auto; /* ✅ прокрутка сайта */
            display: flex;
        }
        
        body {
            background: 
                linear-gradient(135deg, rgba(255, 182, 193, 0.7) 0%, rgba(253, 240, 235, 0.5) 100%),
                url("pink_background.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Chair406', Arial, sans-serif;
        }
        
        /* Остальной CSS слайдера */
        .info-panel {
            width: 380px;
            background: rgba(253, 245, 240, 0.75);
            backdrop-filter: blur(20px);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 5px 0 30px rgba(255, 182, 193, 0.3);
            z-index: 10;
            position: relative;
            flex-shrink: 0;
        }
        
        /* ... весь остальной CSS слайдера БЕЗ ИЗМЕНЕНИЙ ... */
        .info-panel h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #d87093, #ff9bb8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }
        
        .info-panel .current-slide {
            font-size: 20px;
            font-weight: 500;
            color: #555;
            margin-bottom: 50px;
            background: rgba(255, 245, 240, 0.85);
            padding: 18px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 20px rgba(216, 112, 147, 0.2);
        }
        
        .dots {
            display: flex;
            flex-direction: row;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255, 182, 193, 0.7);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .dot.active {
            background: #d87093;
            transform: scale(1.4);
            box-shadow: 0 4px 15px rgba(216, 112, 147, 0.5);
        }

        .slider-section {
            flex: 1;
            position: relative;
            margin-left: 20px;
            padding-right: 50px;
            padding-bottom: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        /* Остальные стили слайдера остаются ТЕМ ЖЕ */
        .slider-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .slider-track {
            display: flex;
            height: 100%;
            transition: transform 1s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        
        .slider-slide {
            min-width: 100%;
            height: 100%;
            flex-shrink: 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-right: 20px;
        }
        
        .slide-image-container {
            width: 570px;
            height: 1122px;
            max-height: 85vh;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 30px 100px rgba(216, 112, 147, 0.4);
            background: rgba(255, 245, 240, 0.1);
            backdrop-filter: blur(15px);
            border: 3px solid rgba(255, 182, 193, 0.6);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
        }
        
        .slide-image-container:hover {
            transform: scale(1.02);
            box-shadow: 0 40px 120px rgba(216, 112, 147, 0.5);
        }
        
        .slide-image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            transition: transform 0.4s ease;
        }
        
        .slide-image-container:hover img {
            transform: scale(1.02);
        }
        
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 50%;
            background: rgba(253, 245, 240, 0.85);
            color: #d87093;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 8px 25px rgba(216, 112, 147, 0.4);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .left-btn { left: 40px; }
        .right-btn { right: 40px; }
        
        .nav-btn:hover {
            background: rgba(255, 182, 193, 0.95);
            transform: translateY(-50%) scale(1.1);
            color: white;
            box-shadow: 0 12px 35px rgba(216, 112, 147, 0.6);
        }

        @media (max-width: 768px) {
            .dots { gap: 10px; }
            .dot { width: 12px; height: 12px; }
            .info-panel { width: 300px; padding: 30px; }
            .info-panel h1 { font-size: 28px; }
            .site-header, .site-footer { padding: 0 20px; }
            .logo { font-size: 24px; }
            .header-nav { gap: 20px; }
            .header-nav a { font-size: 14px; }
            .footer-contacts { gap: 15px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <!-- ШАПКА -->
    <header class="site-header">
        <div class="logo">MyShop</div>
        <nav>
            <ul class="header-nav">
                <li><a href="#home">Главная</a></li>
                <li><a href="#posters">Постеры</a></li>
                <li><a href="#catalog">Каталог</a></li>
                <li><a href="#cart">Корзина</a></li>
                <li><a href="#contact">Контакты</a></li>
            </ul>
        </nav>
    </header>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div class="main-content">
        <div class="info-panel">
            <h1>🖼️ Постеры</h1>
            <div class="current-slide" id="currentSlideInfo">Summer party • 1 290 ₽</div>
            <div class="dots" id="dotsContainer"></div>
        </div>
        
        <div class="slider-section">
            <div class="slider-container">
                <div class="slider-track" id="sliderTrack"></div>
            </div>
            <button class="nav-btn left-btn" onclick="moveSlide(-1)">‹</button>
            <button class="nav-btn right-btn" onclick="moveSlide(1)">›</button>
        </div>
    </div>

    <!-- 🆕 НОЖКА С КОНТАКТАМИ -->
    <footer class="site-footer">
        <div class="footer-contacts">
            <a href="tel:+79991234567" class="contact-item">📱 +7 (999) 123-45-67</a>
            <a href="mailto:info@myshop.ru" class="contact-item">✉️ info@myshop.ru</a>
        </div>
        <div class="social-links">
            <a href="#" class="social-link">📘</a>
            <a href="#" class="social-link">📷</a>
            <a href="#" class="social-link">📱</a>
            <a href="#" class="social-link">🐦</a>
        </div>
    </footer>

    <!-- СКРИПТ СЛАЙДЕРА -->
    <script>
        const posterSlides = [
            {image: 'пляж3.jpg', title: 'Summer party', price: '1 290 ₽'},
            {image: 'постер 14 ф.png', title: "Valentine's day", price: '1 490 ₽'},
            {image: 'постер merry chrismas.png', title: 'Merrry Christmas', price: '1 390 ₽'},
            {image: 'плакат 1 (2).png', title: 'Постер', price: '1 590 ₽'}
        ];

        const track = document.getElementById('sliderTrack');
        const dotsContainer = document.getElementById('dotsContainer');
        const currentSlideInfo = document.getElementById('currentSlideInfo');
        let currentIndex = 1;
        let slideCount = posterSlides.length;
        let autoScrollInterval;
        let isPaused = false;

        function initSlider() {
            posterSlides.forEach((slideData, index) => {
                const slide = document.createElement('div');
                slide.className = 'slider-slide';
                
                const imageContainer = document.createElement('div');
                imageContainer.className = 'slide-image-container';
                const img = document.createElement('img');
                img.src = slideData.image;
                img.alt = slideData.title;
                
                img.onerror = function() {
                    this.style.background = 'linear-gradient(135deg, #f9e4e8, #f0d4d9)';
                    this.style.display = 'flex';
                    this.style.alignItems = 'center';
                    this.style.justifyContent = 'center';
                    this.style.color = '#d87093';
                    this.style.fontSize = '24px';
                    this.style.fontWeight = '600';
                    this.style.fontFamily = "'Chair406', sans-serif";
                    this.textContent = slideData.title;
                };
                
                imageContainer.appendChild(img);
                slide.appendChild(imageContainer);
                track.appendChild(slide);
                
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.onclick = () => goToSlide(index + 1);
                dotsContainer.appendChild(dot);
            });
            
            const firstClone = track.firstElementChild.cloneNode(true);
            const lastClone = track.lastElementChild.cloneNode(true);
            track.appendChild(firstClone);
            track.insertBefore(lastClone, track.firstElementChild);
            
            updateSlider();
            startAutoScroll();
        }

        function updateSlider() {
            track.style.transform = `translateX(-${currentIndex * 100}%)`;
            updateDots();
            updateInfoPanel();
        }

        function updateInfoPanel() {
            const realIndex = ((currentIndex - 1 + slideCount) % slideCount);
            const slideData = posterSlides[realIndex] || posterSlides[0];
            currentSlideInfo.textContent = `${slideData.title} • ${slideData.price}`;
        }

        function updateDots() {
            document.querySelectorAll('.dot').forEach((dot, index) => {
                const realIndex = ((currentIndex - 1 + slideCount) % slideCount);
                dot.classList.toggle('active', index === realIndex);
            });
        }

        function moveSlide(direction) {
            pauseAutoScroll();
            currentIndex += direction;
            if (currentIndex > slideCount) currentIndex = 1;
            else if (currentIndex < 1) currentIndex = slideCount;
            updateSlider();
            setTimeout(resumeAutoScroll, 2000);
        }

        function goToSlide(n) {
            currentIndex = n;
            pauseAutoScroll();
            updateSlider();
            setTimeout(resumeAutoScroll, 2000);
        }

        function startAutoScroll() {
            autoScrollInterval = setInterval(() => {
                if (!isPaused) moveSlide(1);
            }, 6000);
        }

        function pauseAutoScroll() {
            isPaused = true;
            clearInterval(autoScrollInterval);
        }

        function resumeAutoScroll() {
            isPaused = false;
            startAutoScroll();
        }

        document.addEventListener('DOMContentLoaded', function() {
            initSlider();
            document.querySelector('.left-btn').addEventListener('mouseenter', pauseAutoScroll);
            document.querySelector('.right-btn').addEventListener('mouseenter', pauseAutoScroll);
            document.querySelector('.left-btn').addEventListener('mouseleave', resumeAutoScroll);
            document.querySelector('.right-btn').addEventListener('mouseleave', resumeAutoScroll);
        });
    </script>
</body>
</html>
