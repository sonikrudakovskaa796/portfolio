<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Постеры - Слайдер</title>
    <style>
        @font-face {
            font-family: 'Chair406';
            src: url('fonts/Chair406.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 🎨 ФИОЛЕТОВАЯ ТЕМА #CE9DFF */
        :root {
            --main-color: #CE9DFF;
            --main-dark: #B57DE6;
            --accent-light: #E6C7FF;
            --bg-light: #F8F5FF;
            --shadow-color: rgba(206, 157, 255, 0.4);
            --text-dark: #555;
        }

        /* ШАПКА КАК НА КАРТИНКЕ */
        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(135deg, 
                rgba(248, 245, 255, 0.95) 0%, 
                rgba(230, 210, 255, 0.9) 100%);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            box-shadow: 0 4px 20px var(--shadow-color);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .logo {
            font-family: 'Chair406', Arial, sans-serif;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--main-color), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }
        
        .header-nav {
            display: flex;
            gap: 40px;
            list-style: none;
            align-items: center;
        }
        
        .header-nav a {
            color: var(--text-dark);
            text-decoration: none;
            font-family: 'Chair406', Arial, sans-serif;
            font-size: 16px;
            font-weight: 600;
            padding: 12px 25px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 2px solid transparent;
        }
        
        .header-nav a:hover {
            color: white;
            background: linear-gradient(135deg, var(--main-color), var(--main-dark));
            transform: translateY(-3px);
            box-shadow: 0 10px 30px var(--shadow-color);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .header-cart {
            width: 55px;
            height: 55px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--main-color), var(--main-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 8px 25px var(--shadow-color);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        .header-cart:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 20px 40px rgba(206, 157, 255, 0.6);
        }

        /* ФУТЕР */
        .site-footer {
            padding: 60px 50px 40px;
            background: linear-gradient(135deg, 
                var(--bg-light) 0%, 
                rgba(206, 157, 255, 0.9) 100%);
            backdrop-filter: blur(25px);
            text-align: center;
            box-shadow: 0 -4px 20px var(--shadow-color);
        }
        
        .footer-contacts {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
            font-family: 'Chair406', Arial, sans-serif;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            padding: 18px 35px;
            border-radius: 40px;
            background: linear-gradient(135deg, var(--main-color), var(--main-dark));
            box-shadow: 0 10px 30px var(--shadow-color);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        .contact-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(206, 157, 255, 0.6);
        }
        
        .social-links {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        
        .social-link {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--main-color), var(--main-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            text-decoration: none;
            box-shadow: 0 8px 25px var(--shadow-color);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        .social-link:hover {
            transform: scale(1.2) translateY(-8px);
            box-shadow: 0 20px 40px rgba(206, 157, 255, 0.7);
        }

        /* ОСНОВНОЙ КОНТЕНТ */
        .main-content {
            padding-top: 80px;
            min-height: calc(100vh - 200px);
            overflow-y: auto;
            display: flex;
        }
        
        body {
            background: 
                linear-gradient(135deg, rgba(206, 157, 255, 0.7) 0%, rgba(248, 245, 255, 0.5) 100%),
                url("pink_background.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Chair406', Arial, sans-serif;
        }
        
        /* ИНФО-ПАНЕЛЬ */
        .info-panel {
            width: 380px;
            background: rgba(248, 245, 255, 0.85);
            backdrop-filter: blur(20px);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 5px 0 30px var(--shadow-color);
            flex-shrink: 0;
        }
        
        .info-panel h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--main-color), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }
        
        .info-panel .current-slide {
            font-size: 20px;
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 50px;
            background: rgba(255, 255, 255, 0.85);
            padding: 18px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 20px var(--shadow-color);
        }

        /* ТОЧКИ */
        .dots {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        
        .dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(206, 157, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .dot.active {
            background: linear-gradient(135deg, var(--main-color), var(--main-dark));
            transform: scale(1.5);
            box-shadow: 0 0 20px rgba(206, 157, 255, 0.6);
        }

        /* СЛАЙДЕР */
        .slider-section {
            flex: 1;
            position: relative;
            margin-left: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .slider-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .slider-track {
            display: flex;
            height: 100%;
            transition: transform 1s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        
        .slider-slide {
            min-width: 100%;
            height: 100%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .slide-image-container {
            width: 570px;
            height: 1122px;
            max-height: 85vh;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 30px 100px var(--shadow-color);
            background: rgba(248, 245, 255, 0.2);
            backdrop-filter: blur(15px);
            border: 3px solid rgba(206, 157, 255, 0.6);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
        }
        
        .slide-image-container:hover {
            transform: scale(1.02);
            box-shadow: 0 40px 120px var(--shadow-color);
        }
        
        .slide-image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            transition: transform 0.4s ease;
        }
        
        .slide-image-container:hover img {
            transform: scale(1.02);
        }

        /* 🆕 КРУТЫЕ ФИОЛЕТОВЫЕ КНОПКИ */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 55px;
            height: 55px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--main-color), var(--main-dark));
            color: white;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            z-index: 100;
            box-shadow: 
                0 8px 25px var(--shadow-color),
                0 0 0 1px rgba(255, 255, 255, 0.3) inset;
            backdrop-filter: blur(15px);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        .left-btn { left: 40px; }
        .right-btn { right: 40px; }
        
        .nav-btn:hover {
            transform: translateY(-50%) scale(1.15);
            box-shadow: 
                0 15px 40px rgba(206, 157, 255, 0.6),
                0 0 30px rgba(206, 157, 255, 0.4);
            background: linear-gradient(135deg, var(--main-dark), var(--main-color));
        }

        /* АДАПТИВ */
        @media (max-width: 768px) {
            .site-header { padding: 0 20px; height: 70px; }
            .header-nav { gap: 15px; }
            .header-nav a { font-size: 14px; padding: 8px 15px; }
            .logo { font-size: 24px; }
            .main-content { padding-top: 70px; }
            .info-panel { width: 100%; padding: 20px; }
            .info-panel h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <!-- ШАПКА КАК НА КАРТИНКЕ -->
    <header class="site-header">
        <div class="logo">🛍️ Портфолио</div>
        <nav class="header-nav">
            <a href="#home">Главная</a>
            <a href="#shops">Постеры</a>
            <a href="#top">Топ</a>
            <a href="#live">Живой</a>
            <a href="#collections">Коллекции</a>
        </nav>
        <div class="header-cart">🛒</div>
    </header>

    <!-- КОНТЕНТ -->
    <div class="main-content">
        <div class="info-panel">
            <h1>🖼️ Постеры</h1>
            <div class="current-slide" id="currentSlideInfo">Summer party • 1 290 ₽</div>
            <div class="dots" id="dotsContainer"></div>
        </div>
        
        <div class="slider-section">
            <div class="slider-container">
                <div class="slider-track" id="sliderTrack"></div>
            </div>
            <button class="nav-btn left-btn" onclick="moveSlide(-1)">‹</button>
            <button class="nav-btn right-btn" onclick="moveSlide(1)">›</button>
        </div>
    </div>

    <!-- ФУТЕР С КОНТАКТАМИ -->
    <footer class="site-footer">
        <div class="footer-contacts">
            <a href="tel:+79229537600" class="contact-item">📱 +7 (922) 953-76-00</a>
            <a href="mailto:rudakovskayasx@gmail.com" class="contact-item">✉️ rudakovskayasx@gmail.com</a>
            <div class="social-links">
                <a href="#" class="social-link">📱</a>
                <a href="#" class="social-link">📘</a>
                <a href="#" class="social-link">📷</a>
            </div>
        </div>
    </footer>

    <!-- СКРИПТ СЛАЙДЕРА -->
    <script>
        const posterSlides = [
            {image: 'пляж3.jpg', title: 'Summer party', price: '1 290 ₽'},
            {image: 'постер 14 ф.png', title: "Valentine's day", price: '1 490 ₽'},
            {image: 'постер merry chrismas.png', title: 'Merry Christmas', price: '1 390 ₽'},
            {image: 'плакат 1 (2).png', title: 'Постер', price: '1 590 ₽'}
        ];

        const track = document.getElementById('sliderTrack');
        const dotsContainer = document.getElementById('dotsContainer');
        const currentSlideInfo = document.getElementById('currentSlideInfo');
        let currentIndex = 1;
        let slideCount = posterSlides.length;
        let autoScrollInterval;
        let isPaused = false;

        function initSlider() {
            posterSlides.forEach((slideData, index) => {
                const slide = document.createElement('div');
                slide.className = 'slider-slide';
                
                const imageContainer = document.createElement('div');
                imageContainer.className = 'slide-image-container';
                const img = document.createElement('img');
                img.src = slideData.image;
                img.alt = slideData.title;
                
                img.onerror = function() {
                    this.style.background = 'linear-gradient(135deg, var(--bg-light), var(--accent-light))';
                    this.style.display = 'flex';
                    this.style.alignItems = 'center';
                    this.style.justifyContent = 'center';
                    this.style.color = var(--main-color);
                    this.style.fontSize = '24px';
                    this.style.fontWeight = '600';
                    this.style.fontFamily = "'Chair406', sans-serif";
                    this.textContent = slideData.title;
                };
                
                imageContainer.appendChild(img);
                slide.appendChild(imageContainer);
                track.appendChild(slide);
                
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.onclick = () => goToSlide(index + 1);
                dotsContainer.appendChild(dot);
            });
            
            const firstClone = track.firstElementChild.cloneNode(true);
            const lastClone = track.lastElementChild.cloneNode(true);
            track.appendChild(firstClone);
            track.insertBefore(lastClone, track.firstElementChild);
            
            updateSlider();
            startAutoScroll();
        }

        function updateSlider() {
            track.style.transform = `translateX(-${currentIndex * 100}%)`;
            updateDots();
            updateInfoPanel();
        }

        function updateInfoPanel() {
            const realIndex = ((currentIndex - 1 + slideCount) % slideCount);
            const slideData = posterSlides[realIndex] || posterSlides[0];
            currentSlideInfo.textContent = `${slideData.title} • ${slideData.price}`;
        }

        function updateDots() {
            document.querySelectorAll('.dot').forEach((dot, index) => {
                const realIndex = ((currentIndex - 1 + slideCount) % slideCount);
                dot.classList.toggle('active', index === realIndex);
            });
        }

        function moveSlide(direction) {
            pauseAutoScroll();
            currentIndex += direction;
            if (currentIndex > slideCount) currentIndex = 1;
            if (currentIndex < 1) currentIndex = slideCount;
            updateSlider();
            setTimeout(resumeAutoScroll, 2000);
        }

        function goToSlide(n) {
            currentIndex = n;
            pauseAutoScroll();
            updateSlider();
            setTimeout(resumeAutoScroll, 2000);
        }

        function startAutoScroll() {
            autoScrollInterval = setInterval(() => {
                if (!isPaused) moveSlide(1);
            }, 6000);
        }

        function pauseAutoScroll() {
            isPaused = true;
            clearInterval(autoScrollInterval);
        }

        function resumeAutoScroll() {
            isPaused = false;
            startAutoScroll();
        }

        document.addEventListener('DOMContentLoaded', function() {
            initSlider();
            document.querySelector('.left-btn').addEventListener('mouseenter', pauseAutoScroll);
            document.querySelector('.right-btn').addEventListener('mouseenter', pauseAutoScroll);
            document.querySelector('.left-btn').addEventListener('mouseleave', resumeAutoScroll);
            document.querySelector('.right-btn').addEventListener('mouseleave', resumeAutoScroll);
        });
    </script>
</body>
</html>
