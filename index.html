<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Постеры - Слайдер</title>
    <style>
        /* ШРИФТ CHAIR 406 */
        @font-face {
            font-family: 'Chair406';
            src: url('fonts/Chair406.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            height: 100vh;
            background: 
                linear-gradient(135deg, rgba(255, 182, 193, 0.7) 0%, rgba(253, 240, 235, 0.5) 100%),
                url("pink_background.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow: hidden;
            position: relative;
            display: flex;
            font-family: 'Chair406', Arial, sans-serif;
        }
        
        .info-panel {
            width: 380px;
            background: rgba(253, 245, 240, 0.75);
            backdrop-filter: blur(20px);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 5px 0 30px rgba(255, 182, 193, 0.3);
            z-index: 10;
            position: relative;
        }
        
        .info-panel h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #d87093, #ff9bb8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }
        
        .info-panel .current-slide {
            font-size: 20px;
            font-weight: 500;
            color: #555;
            margin-bottom: 50px;
            background: rgba(255, 245, 240, 0.85);
            padding: 18px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 20px rgba(216, 112, 147, 0.2);
        }
        
        .dots {
            display: flex;
            flex-direction: row;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255, 182, 193, 0.7);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .dot.active {
            background: #d87093;
            transform: scale(1.4);
            box-shadow: 0 4px 15px rgba(216, 112, 147, 0.5);
        }

        .slider-section {
            flex: 1;
            position: relative;
            margin-left: 20px;
            padding-right: 50px;
            padding-bottom: 80px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .slider-container {
            position: relative;
            width: 100%;
            height: 30%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .slider-track {
            display: flex;
            height: 100%;
            width: 300%;
            transition: transform 1s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        
        .slider-slide {
            min-width: 33.333%;
            height: 100%;
            flex-shrink: 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-right: 20px;
        }
        
        .main-slider-container {
            position: relative;
            flex: 1;
            overflow: hidden;
            margin: 0 50px;
        }
        
        .main-slider-track {
            display: flex;
            height: 100%;
            transition: transform 1s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        
        .main-slider-slide {
            min-width: 100%;
            height: 100%;
            flex-shrink: 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-right: 20px;
        }
        
        .slide-image-container {
            width: 570px;
            height: 1122px;
            max-height: 85vh;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 30px 100px rgba(216, 112, 147, 0.4);
            background: rgba(255, 245, 240, 0.1);
            backdrop-filter: blur(15px);
            border: 3px solid rgba(255, 182, 193, 0.6);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
        }
        
        .slide-image-container:hover {
            transform: scale(1.02);
            box-shadow: 0 40px 120px rgba(216, 112, 147, 0.5);
        }
        
        .slide-image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            transition: transform 0.4s ease;
        }
        
        .slide-image-container:hover img {
            transform: scale(1.02);
        }

        /* ТЕКСТОВЫЕ СЛАЙДЫ */
        .text-slide-container {
            width: 570px;
            height: 300px;
            background: linear-gradient(135deg, rgba(255, 245, 240, 0.95) 0%, rgba(255, 182, 193, 0.9) 100%);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            backdrop-filter: blur(20px);
            border: 3px solid rgba(255, 182, 193, 0.6);
            box-shadow: 0 20px 60px rgba(216, 112, 147, 0.4);
        }
        
        .text-slide-container h2 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #d87093, #ff9bb8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }
        
        .text-slide-container p {
            font-size: 18px;
            color: #555;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        
        .contact-item {
            font-size: 18px;
            color: #d87093;
            font-weight: 600;
            margin: 10px 0;
        }
        
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 50%;
            background: rgba(253, 245, 240, 0.85);
            color: #d87093;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 8px 25px rgba(216, 112, 147, 0.4);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .main-left-btn { left: 40px; }
        .main-right-btn { right: 40px; }
        
        .nav-btn:hover {
            background: rgba(255, 182, 193, 0.95);
            transform: translateY(-50%) scale(1.1);
            color: white;
            box-shadow: 0 12px 35px rgba(216, 112, 147, 0.6);
        }

        @media (max-width: 768px) {
            .dots { gap: 10px; }
            .dot { width: 12px; height: 12px; }
            .info-panel { width: 300px; padding: 30px; }
            .info-panel h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="info-panel">
        <h1>Постеры</h1>
        <div class="current-slide" id="currentSlideInfo">Summer party • 1 290 ₽</div>
        <div class="dots" id="dotsContainer"></div>
    </div>
    
    <div class="slider-section">
        <!-- ВЕРХНИЙ СЛАЙД "ОБО МНЕ" -->
        <div class="slider-container" id="aboutSlider">
            <div class="slider-track" id="aboutTrack">
                <div class="slider-slide">
                    <div class="text-slide-container">
                        <h2>Обо мне</h2>
                        <p>Frontend разработчик</p>
                        <p>с страстью к дизайну</p>
                        <p>и анимациям</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- ОСНОВНОЙ СЛАЙДЕР С ПОСТЕРАМИ -->
        <div class="main-slider-container">
            <div class="main-slider-track" id="mainSliderTrack"></div>
            <button class="nav-btn main-left-btn" onclick="moveMainSlide(-1)">‹</button>
            <button class="nav-btn main-right-btn" onclick="moveMainSlide(1)">›</button>
        </div>

        <!-- НИЖНИЕ СЛАЙДЫ КОНТАКТОВ -->
        <div class="slider-container" id="contactsSlider">
            <div class="slider-track" id="contactsTrack">
                <div class="slider-slide">
                    <div class="text-slide-container">
                        <h2>Email</h2>
                        <div class="contact-item">hello@design.ru</div>
                    </div>
                </div>
                <div class="slider-slide">
                    <div class="text-slide-container">
                        <h2>Телефон</h2>
                        <div class="contact-item">+7 (999) 123-45-67</div>
                    </div>
                </div>
                <div class="slider-slide">
                    <div class="text-slide-container">
                        <h2>Telegram</h2>
                        <div class="contact-item">@yourusername</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ДАННЫЕ ПОСТЕРОВ (БЕЗ ИЗМЕНЕНИЙ)
        const posterSlides = [
            {image: 'пляж3.jpg', title: 'Summer party', price: '1 290 ₽'},
            {image: 'постер 14 ф.png', title: "Valentine's day", price: '1 490 ₽'},
            {image: 'постер merry chrismas.png', title: 'Merrry Christmas', price: '1 390 ₽'},
            {image: 'плакат 1 (2).png', title: 'Постер', price: '1 590 ₽'}
        ];

        // ОСНОВНОЙ СЛАЙДЕР
        const mainTrack = document.getElementById('mainSliderTrack');
        const dotsContainer = document.getElementById('dotsContainer');
        const currentSlideInfo = document.getElementById('currentSlideInfo');
        let currentMainIndex = 1;
        let mainSlideCount = posterSlides.length;
        let autoScrollInterval;

        // ИНИЦИАЛИЗАЦИЯ ОСНОВНОГО СЛАЙДЕРА
        function initMainSlider() {
            posterSlides.forEach((slideData, index) => {
                const slide = document.createElement('div');
                slide.className = 'main-slider-slide';
                
                const imageContainer = document.createElement('div');
                imageContainer.className = 'slide-image-container';
                
                const img = document.createElement('img');
                img.src = slideData.image;
                img.alt = slideData.title;
                
                img.onerror = function() {
                    this.style.background = 'linear-gradient(135deg, #f9e4e8, #f0d4d9)';
                    this.style.display = 'flex';
                    this.style.alignItems = 'center';
                    this.style.justifyContent = 'center';
                    this.style.color = '#d87093';
                    this.style.fontSize = '24px';
                    this.style.fontWeight = '600';
                    this.style.fontFamily = "'Chair406', sans-serif";
                    this.textContent = slideData.title;
                };
                
                imageContainer.appendChild(img);
                slide.appendChild(imageContainer);
                mainTrack.appendChild(slide);
                
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.onclick = () => goToMainSlide(index + 1);
                dotsContainer.appendChild(dot);
            });
            
            const firstClone = mainTrack.firstElementChild.cloneNode(true);
            const lastClone = mainTrack.lastElementChild.cloneNode(true);
            mainTrack.appendChild(firstClone);
            mainTrack.insertBefore(lastClone, mainTrack.firstElementChild);
            
            updateMainSlider();
            startAutoScroll();
        }

        function updateMainSlider() {
            mainTrack.style.transform = `translateX(-${currentMainIndex * 100}%)`;
            updateMainDots();
            updateInfoPanel();
        }

        function updateInfoPanel() {
            const realIndex = ((currentMainIndex - 1 + mainSlideCount) % mainSlideCount);
            const slideData = posterSlides[realIndex] || posterSlides[0];
            currentSlideInfo.textContent = `${slideData.title} • ${slideData.price}`;
        }

        function updateMainDots() {
            document.querySelectorAll('.dot').forEach((dot, index) => {
                const realIndex = ((currentMainIndex - 1 + mainSlideCount) % mainSlideCount);
                dot.classList.toggle('active', index === realIndex);
            });
        }

        function moveMainSlide(direction) {
            currentMainIndex += direction;
            if (currentMainIndex > mainSlideCount) currentMainIndex = 1;
            else if (currentMainIndex < 1) currentMainIndex = mainSlideCount;
            updateMainSlider();
        }

        function goToMainSlide(n) {
            currentMainIndex = n;
            updateMainSlider();
        }

        function startAutoScroll() {
            autoScrollInterval = setInterval(() => {
                moveMainSlide(1);
            }, 6000);
        }

        // АВТОПАУЗА НА КНОПКАХ
        document.addEventListener('DOMContentLoaded', function() {
            initMainSlider();
            
            const leftBtn = document.querySelector('.main-left-btn');
            const rightBtn = document.querySelector('.main-right-btn');
            
            leftBtn.addEventListener('mouseenter', () => clearInterval(autoScrollInterval));
            rightBtn.addEventListener('mouseenter', () => clearInterval(autoScrollInterval));
            leftBtn.addEventListener('mouseleave', startAutoScroll);
            rightBtn.addEventListener('mouseleave', startAutoScroll);
        });
    </script>
</body>
</html>
