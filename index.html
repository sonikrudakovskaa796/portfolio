<script>
    const posterSlides = [
        {image: 'пляж3.jpg', title: 'Summer party', price: '1 290 ₽'},
        {image: 'постер 14 ф.png', title: "Valentine's day", price: '1 490 ₽'},
        {image: 'постер merry chrismas.png', title: 'Merrry Christmas', price: '1 390 ₽'},
        {image: 'плакат 1.png', title: 'Постер 4', price: '1 590 ₽'}
    ];
    
    const track = document.getElementById('sliderTrack');
    const dotsContainer = document.getElementById('dotsContainer');
    const currentSlideInfo = document.getElementById('currentSlideInfo');
    let currentIndex = 1;
    let slideCount = posterSlides.length;
    let autoScrollInterval;
    let isPaused = false;
    
    function initSlider() {
        posterSlides.forEach((slideData, index) => {
            const slide = document.createElement('div');
            slide.className = 'slider-slide';
            
            const imageContainer = document.createElement('div');
            imageContainer.className = 'slide-image-container';
            const img = document.createElement('img');
            img.src = slideData.image;
            img.alt = slideData.title;
            img.onerror = function() {
                this.src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNTcwIiBoZWlnaHQ9IjExMjJweCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZmZmIiBzdHJva2U9IiNjY2MiIHN0cm9rZS13aWR0aD0iMiIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMjQiIGZpbGw9IiM5OTkiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGR5PSIuM2VtIj5cdDJm8INC60LDRgNCw0L3QutCw0YAiPC90ZXh0Pjwvc3ZnPg==';
            };
            imageContainer.appendChild(img);
            slide.appendChild(imageContainer);
            track.appendChild(slide);
            
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.onclick = () => goToSlide(index + 1);
            dotsContainer.appendChild(dot);
        });
        
        const firstClone = track.firstElementChild.cloneNode(true);
        const lastClone = track.lastElementChild.cloneNode(true);
        track.appendChild(firstClone);
        track.insertBefore(lastClone, track.firstElementChild);
        
        updateSlider();
        startAutoScroll();
    }
    
    function updateSlider() {
        track.style.transform = `translateX(-${currentIndex * 100}%)`;
        updateDots();
        updateInfoPanel();
    }
    
    function updateInfoPanel() {
        const realIndex = (currentIndex - 1) % slideCount;
        const slideData = posterSlides[realIndex] || posterSlides[0];
        currentSlideInfo.textContent = `${slideData.title} • ${slideData.price}`;
    }
    
    function updateDots() {
        document.querySelectorAll('.dot').forEach((dot, index) => {
            const realIndex = (currentIndex - 1) % slideCount;
            dot.classList.toggle('active', index === realIndex);
        });
    }
    
    function moveSlide(direction) {
        pauseAutoScroll();
        currentIndex += direction;
        if (currentIndex > slideCount) currentIndex = 1;
        else if (currentIndex < 1) currentIndex = slideCount;
        updateSlider();
        setTimeout(resumeAutoScroll, 1000);
    }
    
    function goToSlide(n) {
        currentIndex = n;
        pauseAutoScroll();
        updateSlider();
        setTimeout(resumeAutoScroll, 2000);
    }
    
    function startAutoScroll() {
        autoScrollInterval = setInterval(() => {
            if (!isPaused) moveSlide(1);
        }, 8000);
    }
    
    function pauseAutoScroll() {
        isPaused = true;
        clearInterval(autoScrollInterval);
    }
    
    function resumeAutoScroll() {
        isPaused = false;
        startAutoScroll();
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelector('.left-btn').addEventListener('mouseenter', pauseAutoScroll);
        document.querySelector('.right-btn').addEventListener('mouseenter', pauseAutoScroll);
        document.querySelectorAll('.dot').forEach(dot => dot.addEventListener('mouseenter', pauseAutoScroll));
        document.querySelector('.left-btn').addEventListener('mouseleave', resumeAutoScroll);
        document.querySelector('.right-btn').addEventListener('mouseleave', resumeAutoScroll);
        document.querySelectorAll('.dot').forEach(dot => dot.addEventListener('mouseleave', resumeAutoScroll));
        initSlider();
    });
</script>
