<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Постеры - Слайдер</title>
    <style>
        @font-face {
            font-family: 'Chair406';
            src: url('fonts/Chair406.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 🌟 КРАСИВАЯ БОЛЬШАЯ ШАПКА (только навигация) */
        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background: linear-gradient(135deg, 
                rgba(253, 245, 240, 0.95) 0%, 
                rgba(255, 182, 193, 0.9) 100%);
            backdrop-filter: blur(30px);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding: 20px 40px;
            box-shadow: 0 10px 40px rgba(216, 112, 147, 0.4);
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex: 1;
        }
        
        .logo {
            font-family: 'Chair406', Arial, sans-serif;
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #d87093, #ff9bb8, #ffb3d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header-nav {
            display: flex;
            gap: 30px;
            list-style: none;
        }
        
        .header-nav a {
            color: #555;
            text-decoration: none;
            font-family: 'Chair406', Arial, sans-serif;
            font-size: 18px;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 30px;
            transition: all 0.4s ease;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
        }
        
        .header-nav a:hover {
            color: white;
            background: linear-gradient(135deg, #d87093, #ff9bb8);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(216, 112, 147, 0.5);
        }

        /* 🆗 ОТДЕЛЬНАЯ ПЛАШКА КОНТАКТОВ ВНИЗУ */
        .contacts-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: linear-gradient(135deg, 
                rgba(253, 245, 240, 0.95) 0%, 
                rgba(255, 182, 193, 0.9) 100%);
            backdrop-filter: blur(25px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-shadow: 0 -8px 30px rgba(216, 112, 147, 0.3);
            border-top: 2px solid rgba(255, 182, 193, 0.5);
        }
        
        .contacts-left {
            display: flex;
            gap: 30px;
            align-items: center;
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #d87093;
            font-family: 'Chair406', Arial, sans-serif;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .contact-item:hover {
            background: linear-gradient(135deg, #d87093, #ff9bb8);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(216, 112, 147, 0.4);
        }
        
        .social-links {
            display: flex;
            gap: 15px;
        }
        
        .social-link {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d87093, #ff9bb8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(216, 112, 147, 0.4);
        }
        
        .social-link:hover {
            transform: scale(1.15) translateY(-3px);
            box-shadow: 0 10px 30px rgba(216, 112, 147, 0.6);
        }

        /* Контент */
        .main-content {
            padding-top: 120px;   /* большая шапка */
            padding-bottom: 70px; /* плашка контактов */
            min-height: 100vh;
            overflow-y: auto;
            display: flex;
        }
        
        body {
            background: 
                linear-gradient(135deg, rgba(255, 182, 193, 0.7) 0%, rgba(253, 240, 235, 0.5) 100%),
                url("pink_background.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Chair406', Arial, sans-serif;
        }

        /* Слайдер (без изменений) */
        .info-panel {
            width: 380px;
            background: rgba(253, 245, 240, 0.75);
            backdrop-filter: blur(20px);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 5px 0 30px rgba(255, 182, 193, 0.3);
        }
        
        .info-panel h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #d87093, #ff9bb8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }
        
        .info-panel .current-slide {
            font-size: 20px;
            font-weight: 500;
            color: #555;
            margin-bottom: 50px;
            background: rgba(255, 245, 240, 0.85);
            padding: 18px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 20px rgba(216, 112, 147, 0.2);
        }
        
        .dots { display: flex; gap: 12px; justify-content: center; }
        .dot {
            width: 14px; height: 14px; border-radius: 50%;
            background: rgba(255, 182, 193, 0.7); cursor: pointer;
            transition: all 0.3s ease;
        }
        .dot.active { background: #d87093; transform: scale(1.4); }

        .slider-section {
            flex: 1; position: relative; margin-left: 20px;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }
        
        .slider-container {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; overflow: hidden;
        }
        
        .slider-track { display: flex; height: 100%; transition: transform 1s ease; }
        .slider-slide {
            min-width: 100%; height: 100%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        
        .slide-image-container {
            width: 570px; height: 1122px; max-height: 85vh;
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 30px 100px rgba(216, 112, 147, 0.4);
            background: rgba(255, 245, 240, 0.1);
            backdrop-filter: blur(15px); border: 3px solid rgba(255, 182, 193, 0.6);
            transition: all 0.4s ease;
        }
        
        .slide-image-container img { width: 100%; height: 100%; object-fit: contain; }
        
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 45px; height: 45px; border: none; border-radius: 50%;
            background: rgba(253, 245, 240, 0.85); color: #d87093;
            font-size: 18px; font-weight: 600; cursor: pointer; z-index: 100;
            backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .left-btn { left: 40px; }
        .right-btn { right: 40px; }
        .nav-btn:hover {
            background: rgba(255, 182, 193, 0.95); color: white;
            transform: translateY(-50%) scale(1.1);
        }
    </style>
</head>
<body>
    <!-- 🌟 КРАСИВАЯ БОЛЬШАЯ ШАПКА (только навигация) -->
    <header class="site-header">
        <div class="header-top">
            <div class="logo">🛍️ Портфолио</div>
            <nav>
                <ul class="header-nav">
                    <li><a href="#home">Главная</a></li>
                    <li><a href="#posters">Постеры</a></li>
                    <li><a href="#cart">Корзина</a></li>
                    <li><a href="#contact">Контакты</a></li>
                </ul>
            </nav>
        7</div>
    </header>

    <!-- Контент -->
    <div class="main-content">
        <div class="info-panel">
            <h1>🖼️ Постеры</h1>
            <div class="current-slide" id="currentSlideInfo">Summer party • 1 290 ₽</div>
