<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Постеры - Слайдер</title>
    <style>
        @font-face {
            font-family: 'Chair406';
            src: url('fonts/Chair406.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * {  /* ← Добавил * */
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            height: 100vh;
            background: 
                linear-gradient(135deg, rgba(255, 182, 193, 0.7) 0%, rgba(253, 240, 235, 0.5) 100%),
                url("pink_background.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow: hidden;
            position: relative;
            display: flex;
            font-family: 'Chair406', Arial, sans-serif;  /* ← Chair406 вместо CustomFont */
        }
        
        /* Остальной CSS без изменений */
        .info-panel {
            width: 380px;
            background: rgba(253, 245, 240, 0.75);
            backdrop-filter: blur(20px);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 5px 0 30px rgba(255, 182, 193, 0.3);
            z-index: 10;
            position: relative;
        }
        
        /* ... весь остальной CSS остается тот же ... */
        
        .info-panel h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #d87093, #ff9bb8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }
        /* Остальное без изменений */
    </style>
</head>
<body>
    <!-- HTML и JavaScript остаются ТОЧНО такими же -->
</body>
</html>
