<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Постеры - Слайдер</title>
    <style>
        /* ШРИФТ CHAIR 406 */
        @font-face {
            font-family: 'Chair406';
            src: url('fonts/Chair406.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 🔧 КОМПАКТНАЯ ШАПКА */
        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px; /* ← Было 70px */
            background: rgba(253, 245, 240, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px; /* ← Было 30px */
            box-shadow: 0 2px 15px rgba(216, 112, 147, 0.2);
            border-bottom: 1px solid rgba(255, 182, 193, 0.3);
        }
        
        .logo {
            font-family: 'Chair406', Arial, sans-serif;
            font-size: 22px; /* ← Было 28px */
            font-weight: 700;
            background: linear-gradient(135deg, #d87093, #ff9bb8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header-nav {
            display: flex;
            gap: 20px; /* ← Было 30px */
            list-style: none;
        }
        
        .header-nav a {
            color: #555;
            text-decoration: none;
            font-family: 'Chair406', Arial, sans-serif;
            font-size: 14px; /* ← Было 16px */
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        /* НОЖКА */
        .site-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px; /* ← Было 80px */
            background: rgba(253, 245, 240, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 -2px 15px rgba(216, 112, 147, 0.2);
            border-top: 1px solid rgba(255, 182, 193, 0.3);
        }

        /* ОСНОВНОЙ КОНТЕНТ */
        .main-content {
            padding-top: 50px;  /* ← Подогнано под новую шапку */
            padding-bottom: 60px; /* ← Подогнано под новую ножку */
            min-height: 100vh;
            overflow-y: auto;
            display: flex;
        }
        
        body {
            background: 
                linear-gradient(135deg, rgba(255, 182, 193, 0.7) 0%, rgba(253, 240, 235, 0.5) 100%),
                url("pink_background.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Chair406', Arial, sans-serif;
        }
        
        /* Остальной CSS слайдера */
        .info-panel {
            width: 380px;
            background: rgba(253, 245, 240, 0.75);
            backdrop-filter: blur(20px);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 5px 0 30px rgba(255, 182, 193, 0.3);
            z-index: 10;
            position: relative;
            flex-shrink: 0;
        }
        
        .info-panel h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #d87093, #ff9bb8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }
        
        .info-panel .current-slide {
            font-size: 20px;
            font-weight: 500;
            color: #555;
            margin-bottom: 50px;
            background: rgba(255, 245, 240, 0.85);
            padding: 18px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 20px rgba(216, 112, 147, 0.2);
        }
        
        .dots {
            display: flex;
            flex-direction: row;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255, 182, 193, 0.7);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .dot.active {
            background: #d87093;
            transform: scale(1.4);
            box-shadow: 0 4px 15px rgba(216, 112, 147, 0.5);
        }

        .slider-section {
            flex: 1;
            position: relative;
            margin-left: 20px;
            padding-right: 50px;
            padding-bottom: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .slider-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .slider-track {
            display: flex;
            height: 100%;
            transition: transform 1s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        
        .slider-slide {
            min-width: 100%;
            height: 100%;
            flex-shrink: 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-right: 20px;
        }
        
        .slide-image-container {
            width: 570px;
            height: 1122px;
            max-height: 85vh;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 30px 100px rgba(216, 112, 147, 0.4);
            background: rgba(255, 245, 240, 0.1);
            backdrop-filter: blur(15px);
            border: 3px solid rgba(255, 182, 193, 0.6);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
        }
        
        .slide-image-container:hover {
            transform: scale(1.02);
            box-shadow: 0 40px 120px rgba(216, 112, 147, 0.5);
        }
        
        .slide-image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            transition: transform 0.4s ease;
        }
        
        .slide-image-container:hover img {
            transform: scale(1.02);
        }
        
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 50%;
            background: rgba(253, 245, 240, 0.85);
            color: #d87093;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 8px 25px rgba(216, 112, 147, 0.4);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .left-btn { left: 40px; }
        .right-btn { right: 40px; }
        
        .nav-btn:hover {
            background: rgba(255, 182, 193, 0.95);
            transform: translateY(-50%) scale(1.1);
            color: white;
            box-shadow: 0 12px 35px rgba(216, 112, 147, 0.6);
        }

        @media (max-width: 768px) {
            .site-header, .site-footer { 
                height: 45px; 
                padding: 0 15px; 
            }
            .logo { font-size: 18px; }
            .header-nav { gap: 15px; }
            .header-nav a { font-size: 12px; }
            .main-content { padding-top: 45px; padding-bottom: 45px; }
            .info-panel { width: 300px; padding: 30px; }
            .info-panel h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <!-- КОМПАКТНАЯ ШАПКА -->
    <header class="site-header">
        <div class="logo">Портфолио</div>
        <nav>
            <ul class="header-nav">
                <li><a href="#home">Главная</a></li>
                <li><a href="#posters">Постеры</a></li>
                <li><a href="#cart">Корзина</a></li>
                <li><a href="#contact">Контакты</a></li>
            </ul>
        </nav>
    </header>

    <!-- КОНТЕНТ -->
    <div class="main-content">

    <!-- КОМПАКТНАЯ НОЖКА -->
    <footer class="site-footer">
        <div class="footer-contacts">

            <a href="mailto:rudakovskayasx@gmail.com" class="contact-item">✉️ rudakovskayasx@gmail.com</a>
        </div>
        <div class="social-links">
            <a href="#" class="social-link">📱</a>
        </div>
    </footer>
